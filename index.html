<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ===== Design Tokens ===== */
:root {
  --bg: #0b0a0f;
  --bg-card: #14131a;
  --surface: #111018;
  --border: rgba(255, 255, 255, .08);
  --text: #ede9e3;
  --text-dim: #8a8598;
  --accent: #d4a259;
  --accent-2: #e8c078;
  --accent-3: #c48b3c;
  --grad: linear-gradient(135deg, #d4a259 0%, #e8c078 50%, #c48b3c 100%);
  --radius: 16px;
  --radius-sm: 10px;
  --pill: 99px;
  --ease: .35s cubic-bezier(.4, 0, .2, 1);
  --shadow: 0 20px 60px rgba(0, 0, 0, .45);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); }
body {
  font-family: 'Noto Sans KR', system-ui, -apple-system, sans-serif;
  font-size: 16px; line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ===== Typography ===== */
h1, h2, h3 { font-weight: 800; letter-spacing: -.02em; line-height: 1.2; }
h1 { font-size: clamp(2rem, 5.5vw, 3.6rem); font-weight: 900; letter-spacing: -.03em; }
h2 { font-size: clamp(1.5rem, 3.5vw, 2.3rem); }
h3 { font-size: 1.2rem; }
.eyebrow {
  display: inline-block;
  font-size: .78rem; letter-spacing: .15em; text-transform: uppercase;
  color: var(--accent); font-weight: 700; margin-bottom: 16px;
}
.grad-text {
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== Layout ===== */
.container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
section { padding: 100px 0; position: relative; }
.sec-dark { background: var(--surface); }
.sec-head { text-align: center; max-width: 720px; margin: 0 auto 56px; }
.sec-head p { color: var(--text-dim); margin-top: 14px; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 26px; border-radius: var(--pill);
  font-weight: 700; font-size: .95rem;
  transition: all var(--ease);
  white-space: nowrap;
}
.btn-lg { padding: 16px 32px; font-size: 1rem; }
.btn-primary { background: var(--grad); color: #1a1208; box-shadow: 0 10px 30px rgba(212, 162, 89, .3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(212, 162, 89, .45); }
.btn-ghost { background: rgba(255, 255, 255, .06); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: rgba(255, 255, 255, .1); border-color: var(--accent); }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: var(--pill);
  background: rgba(212, 162, 89, .12); color: var(--accent);
  font-size: .8rem; font-weight: 600;
  border: 1px solid rgba(212, 162, 89, .25);
}

/* ===== Nav ===== */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  background: rgba(11, 10, 15, .7);
  border-bottom: 1px solid var(--border);
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 68px; }
.nav-logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -.02em; }
.nav-logo span { background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.nav-links { display: flex; gap: 32px; }
.nav-links button { color: var(--text-dim); font-size: .92rem; transition: color var(--ease); }
.nav-links button:hover, .nav-links button.nav-active { color: var(--accent); }
.nav-cta { padding: 10px 20px; font-size: .88rem; }

/* ===== Hero ===== */
.hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 120px 24px 80px;
  position: relative; overflow: hidden;
}
.hero::before, .hero::after {
  content: ''; position: absolute; width: 600px; height: 600px;
  border-radius: 50%; filter: blur(120px); opacity: .25; pointer-events: none;
}
.hero::before { background: var(--accent); top: -200px; left: -100px; }
.hero::after { background: var(--accent-3); bottom: -200px; right: -100px; }
.hero-inner { position: relative; z-index: 1; max-width: 880px; }
.hero h1 { margin: 24px 0 20px; }
.hero-sub { color: var(--text-dim); font-size: 1.1rem; max-width: 600px; margin: 0 auto 36px; }
.hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 60px; }
.hero-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;

  padding-top: 40px; border-top: 1px solid var(--border);
}
.stat-num { font-size: 2rem; font-weight: 900; }

.svc-card h3 { margin-bottom: 8px; }
.svc-card p { color: var(--text-dim); font-size: .92rem; }
.svc-price { margin-top: 16px; font-weight: 700; color: var(--accent); }

/* ===== Process ===== */
.proc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; position: relative; }
.proc-step { text-align: center; position: relative; padding: 24px; }

}

/* ===== Reviews ===== */
.rev-banner {

.rev-date { color: var(--text-dim); font-size: .78rem; }

/* ===== FAQ ===== */
.faq-wrap { max-width: 720px; margin: 0 auto; }
.faq-item {
  border-bottom: 1px solid var(--border); padding: 8px 0;
}
.faq-q {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; text-align: left; font-weight: 600; font-size: 1.02rem;
  transition: color var(--ease);
}
.faq-q:hover { color: var(--accent); }
.faq-arrow { transition: transform var(--ease); color: var(--accent); font-size: 1.2rem; }
.faq-item.open .faq-arrow { transform: rotate(180deg); }
.faq-a {
  max-height: 0; overflow: hidden; color: var(--text-dim); line-height: 1.7;
  transition: max-height var(--ease), padding var(--ease);
}
.faq-item.open .faq-a { max-height: 500px; padding-bottom: 20px; }

/* ===== Form ===== */
.form-wrap { max-width: 600px; margin: 0 auto; }
.form-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 40px;
}
.form-row { margin-bottom: 24px; }
.form-label { display: block; font-weight: 600; font-size: .9rem; margin-bottom: 8px; }
.form-input, .form-textarea, .form-select-trigger {
  width: 100%; padding: 12px 16px;
  background: rgba(0, 0, 0, .3); border: 1px solid var(--border);

}
.form-input:focus, .form-textarea:focus, .form-select-trigger:focus { outline: none; border-color: var(--accent); }

.cs-wrap { position: relative; }

.cs-arrow { transition: transform var(--ease); }

}

}
.cs-opt:hover { background: rgba(212, 162, 89, .1); }

.star-row { display: flex; gap: 6px; }
.star-btn { font-size: 1.6rem; color: rgba(255, 255, 255, .15); transition: all var(--ease); }

.btn-block { width: 100%; }
.modal-quote { font-size: 1.05rem; color: var(--text); }

.cta-wrap {

}

  -webkit-mask-composite: xor; mask-composite: exclude;

}
.cta-wrap p { color: var(--text-dim); margin: 16px auto 28px; max-width: 520px; }
.cta-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* ===== Footer ===== */
.foot { padding: 60px 0 40px; border-top: 1px solid var(--border); }
.foot-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px; }
.foot-brand { font-weight: 800; }
.foot-links { display: flex; gap: 24px; flex-wrap: wrap; }
.foot-links button { color: var(--text-dim); font-size: .88rem; transition: color var(--ease); }
.foot-links button:hover { color: var(--accent); }
.foot-link-strong { color: var(--accent) !important; font-weight: 600; }
.foot-copy { color: var(--text-dim); font-size: .82rem; margin-top: 32px; text-align: center; }

/* ===== Modal ===== */
.modal-overlay {

}

.car-nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px 0; }
.car-arrow { width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, .06); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all var(--ease); }
.car-arrow:hover:not(:disabled) { background: var(--grad); color: #1a1208; }
.car-arrow:disabled { opacity: .3; cursor: not-allowed; }
.car-idx { color: var(--text-dim); font-size: .9rem; }

  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; cursor: pointer;
  transition: all var(--ease);
}

.blog-thumb img { width: 100%; height: 100%; object-fit: cover; }
.blog-body { padding: 24px; }
.blog-cat { font-size: .72rem; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
.blog-card h3 { margin: 8px 0; font-size: 1.15rem; }

.blog-meta { display: flex; gap: 12px; align-items: center; margin-top: 16px; color: var(--text-dim); font-size: .8rem; }

/* ===== Article ===== */
.article { padding: 120px 0 80px; }
.article-inner { max-width: 760px; margin: 0 auto; }
.article-back { color: var(--text-dim); margin-bottom: 32px; font-size: .9rem; }
.article-back:hover { color: var(--accent); }

.article-meta { display: flex; gap: 16px; align-items: center; color: var(--text-dim); font-size: .9rem; padding-bottom: 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.article-meta .rev-avatar { width: 28px; height: 28px; font-size: .8rem; }
.article-img { aspect-ratio: 16 / 9; max-height: 320px; width: 100%; background: linear-gradient(135deg, #1a1820, #0d0c12); display: flex; align-items: center; justify-content: center; font-size: 6rem; border-radius: var(--radius); margin-bottom: 32px; overflow: hidden; }
.article-img img { width: 100%; height: 100%; object-fit: cover; }
.article-body { color: var(--text); line-height: 1.8; }
.article-body h2 { margin: 32px 0 16px; }
.article-body h3 { margin: 24px 0 12px; }
.article-body p { margin-bottom: 16px; color: rgba(237, 233, 227, .85); }
.article-body ul, .article-body ol { margin: 0 0 16px 24px; color: rgba(237, 233, 227, .85); }
.article-body strong { color: var(--accent); font-weight: 700; }
.article-tags { margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
.article-tag { font-size: .82rem; color: var(--text-dim); }
.article-tag::before { content: '#'; color: var(--accent); margin-right: 2px; }

/* ===== State Messages ===== */
.state-msg { text-align: center; padding: 80px 20px; color: var(--text-dim); }
.spinner {
  display: inline-block; width: 24px; height: 24px;
  border: 2px solid rgba(212, 162, 89, .2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .8s linear infinite; margin-right: 12px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Animation on Scroll ===== */
.anim { opacity: 0; transform: translateY(28px); transition: opacity .6s var(--ease), transform .6s var(--ease); }
.anim.show { opacity: 1; transform: translateY(0); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  section { padding: 64px 0; }
  .container { padding: 0 16px; }
  .nav-links { display: none; }
  .hero { padding: 100px 16px 60px; }
  .hero-cta { flex-direction: column; align-items: stretch; }
  .hero-cta .btn { width: 100%; }
  .hero-stats { grid-template-columns: 1fr; gap: 20px; padding-top: 28px; }
  .svc-grid, .rev-grid, .blog-grid, .rev-banner { grid-template-columns: 1fr; }
  .blog-card.featured { grid-column: span 1; }
  .proc-grid { grid-template-columns: repeat(2, 1fr); }
  .proc-step::after { display: none; }
  .form-card { padding: 24px; }
  .modal-body { padding: 24px; }
  .foot-inner { flex-direction: column; align-items: flex-start; }
}

await res.json();\n  const results = data.results || [];\n  if (!results.length) return FALLBACK_STORIES;\n  const items = await Promise.all(results.map(async page => {\n    const coverUrl = getValue(getProp(page.properties, '대표이미지URL'));\n    const img = coverUrl || await fetchDbImageFor(page.id);\n    return {\n      id: page.id,\n      title: getValue(getProp(page.properties, '제목')) || '제목 없음',\n      cat: getValue(getProp(page.properties, '카테고리')) || '문화',\n      summary: getValue(getProp(page.properties, '요약')) || '',\n      body: getValue(getProp(page.properties, '본문')) || '',\n      emoji: getValue(getProp(page.properties, '썸네일이모지')) || '📖',\n      author: getValue(getProp(page.properties, '저자')) || 'Angel\\'s Share',\n      date: getValue(getProp(page.properties, '발행일')) || '',\n      readTime: Number(getValue(getProp(page.properties, '읽는시간'))) || 5,\n      views: Number(getValue(getProp(page.properties, '조회수'))) || 0,\n      featured: !!getValue(getProp(page.properties, '추천')),\n      tags: getValue(getProp(page.properties, '태그')) || [],\n      img,\n    };\n  }));\n  return items;\n}\n\nasync function loadFaqs() {\n  const id = extractDbId(DB_FAQ);\n  if (!id || id.length !== 32) return FALLBACK_FAQ;\n  const res = await fetch(`/api/notion/databases/${id}/query`, {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify({\n      page_size: 50,\n      filter: { property: '공개 여부', checkbox: { equals: true } },\n      sorts: [{ property: '정렬순서', direction: 'ascending' }],\n    }),\n  });\n  const data = await res.json();\n  const results = data.results || [];\n  if (!results.length) return FALLBACK_FAQ;\n  return results.map(page => ({\n    id: page.id,\n    q: getValue(getProp(page.properties, '질문')) || '',\n    a: getValue(getProp(page.properties, '답변')) || '',\n    cat: getValue(getProp(page.properties, '카테고리')) || '기타',\n    order: Number(getValue(getProp(page.properties, '정렬순서'))) || 999,\n  }));\n}\n\n/* ============================================\n   IntersectionObserver 훅\n   ============================================ */\nfunction useReveal() {\n  useEffect(() => {\n    const els = document.querySelectorAll('.anim');\n    const io = new IntersectionObserver(entries => {\n      entries.forEach(e => {\n        if (e.isIntersecting) { e.target.classList.add('show'); io.unobserve(e.target); }\n      });\n    }, { threshold: 0.12 });\n    els.forEach(el => io.observe(el));\n    return () => io.disconnect();\n  });\n}\n\n/* ============================================\n   공통 컴포넌트\n   ============================================ */\nfunction Spinner({ msg }) {\n  return (\n    <div className=\"state-msg\">\n      <span className=\"spinner\"></span>{msg || '불러오는 중…'}\n    </div>\n  );\n}\n\nfunction Empty({ msg }) {\n  return <div className=\"state-msg\">{msg || '데이터가 없습니다'}</div>;\n}\n\nfunction Stars({ n }) {\n  const cn = Math.max(0, Math.min(5, Number(n) || 0));\n  return <div className=\"rev-stars\">{'★'.repeat(cn)}{'☆'.repeat(5 - cn)}</div>;\n}\n\nfunction Avatar({ name }) {\n  const initial = (name || '?').slice(0, 1);\n  return <div className=\"rev-avatar\">{initial}</div>;\n}\n\n/* ============================================\n   Nav\n   ============================================ */\nfunction Nav({ view, goHome, goBlog }) {\n  const scrollTo = (id) => {\n    if (view !== 'home') { goHome(id); return; }\n    const el = document.getElementById(id);\n    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n  };\n  const blogActive = view === 'blog' || view === 'article' ? ' nav-active' : '';\n  return (\n    <nav className=\"nav\">\n      <div className=\"container nav-inner\">\n        <button className=\"nav-logo\" onClick={() => goHome()}>🥃 <span>Angel's Share</span></button>\n        <div className=\"nav-links\">\n          <button onClick={() => scrollTo('services')}>위스키</button>\n          <button onClick={() => scrollTo('process')}>이용 방법</button>\n          <button onClick={() => scrollTo('reviews')}>후기</button>\n          <button className={'nav-blog' + blogActive} onClick={() => goBlog()}>위스키 스토리</button>\n          <button onClick={() => scrollTo('faq')}>FAQ</button>\n        </div>\n        <button className=\"btn btn-primary nav-cta\" onClick={() => scrollTo('cta')}>주문하기</button>\n      </div>\n    </nav>\n  );\n}\n\n/* ============================================\n   Hero\n   ============================================ */\nfunction Hero({ goBlog }) {\n  const scrollTo = (id) => {\n    const el = document.getElementById(id);\n    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n  };\n  return (\n    <section className=\"hero\" id=\"hero\">\n      <div className=\"hero-inner\">\n        <span className=\"chip\">🏆 2026 위스키 어워드 수상</span>\n        <h1>한 잔의 여유,<br/><span className=\"grad-text\">세상에서 가장 깊은 한 모금.</span></h1>\n        <p className=\"hero-sub\">큐레이션, 교육, 경험을 통합한 프리미엄 위스키 브랜드<br/>입문자부터 마니아까지, 당신의 취향을 깊이 들여다봅니다.</p>\n        <div className=\"hero-cta\">\n          <button className=\"btn btn-primary btn-lg\" onClick={() => scrollTo('services')}>컬렉션 둘러보기</button>\n          <button className=\"btn btn-ghost btn-lg\" onClick={() => scrollTo('reviews')}>고객 후기</button>\n          <button className=\"btn btn-ghost btn-lg\" onClick={() => goBlog()}>📖 위스키 스토리</button>\n        </div>\n        <div className=\"hero-stats\">\n          <div><div className=\"stat-num grad\">300+</div><div className=\"stat-label\">큐레이션 보틀</div></div>\n          <div><div className=\"stat-num grad\">5.0 ★</div><div className=\"stat-label\">평균 별점</div></div>\n          <div><div className=\"stat-num grad\">98%</div><div className=\"stat-label\">재구매율</div></div>\n        </div>\n      </div>\n      <div className=\"scroll-hint\">↓ 스크롤하여 더 알아보기</div>\n    </section>\n  );\n}\n\n/* ============================================\n   Trust Bar\n   ============================================ */\nfunction TrustBar() {\n  const items = ['Whisky Magazine', 'JW Awards 2026', '한국소믈리에협회', 'Forbes Korea', 'The Spirits Business'];\n  return (\n    <section className=\"trust\">\n      <div className=\"container\">\n        <div className=\"trust-label\">As Featured In</div>\n        <div className=\"trust-list\">\n          {items.map(t => <span key={t} className=\"trust-item\">{t}</span>)}\n        </div>\n      </div>\n    </section>\n  );\n}\n\n/* ============================================\n   Services\n   ============================================ */\nfunction Services() {\n  const [items, setItems] = useState(null);\n  const [filter, setFilter] = useState('전체');\n  const [active, setActive] = useState(null);\n\n  useEffect(() => {\n    loadServices().then(setItems).catch(() => setItems(FALLBACK_SVC));\n  }, []);\n\n  useEffect(() => {\n    if (!active) return;\n    document.body.style.overflow = 'hidden';\n    const onKey = (e) => { if (e.key === 'Escape') setActive(null); };\n    window.addEventListener('keydown', onKey);\n    return () => { document.body.style.overflow = ''; window.removeEventListener('keydown', onKey); };\n  }, [active]);\n\n  const cats = useMemo(() => {\n    if (!items) return ['전체'];\n    const set = new Set(items.map(i => i.cat).filter(Boolean));\n    return ['전체', ...Array.from(set)];\n  }, [items]);\n\n  const filtered = useMemo(() => {\n    if (!items) return [];\n    return filter === '전체' ? items : items.filter(i => i.cat === filter);\n  }, [items, filter]);\n\n  const statusClass = (s) => s === '모집중' ? 'svc-tag status-open' : 'svc-tag status-always';\n\n  return (\n    <section id=\"services\" className=\"sec-dark\">\n      <div className=\"container\">\n        <div className=\"sec-head anim\">\n          <span className=\"eyebrow\">위스키 컬렉션</span>\n          <h2>당신만의 한 잔을 큐레이션합니다</h2>\n          <p>전문 소믈리에가 엄선한 프리미엄 위스키부터 입문자 클래스까지</p>\n        </div>\n\n        {!items && <Spinner msg=\"위스키 컬렉션을 불러오는 중…\" />}\n\n        {items && (\n          <>\n            <div className=\"filter-bar anim\">\n              {cats.map(c => (\n                <button key={c} className={'f-chip' + (c === filter ? ' active' : '')} onClick={() => setFilter(c)}>{c}</button>\n              ))}\n            </div>\n            {filtered.length === 0 ? <Empty /> : (\n              <div className=\"svc-grid\">\n                {filtered.map(s => (\n                  <article key={s.id} className=\"svc-card anim\" onClick={() => setActive(s)}>\n                    <div className=\"svc-thumb\">\n                      {s.img ? <img src={s.img} alt={s.name} onError={(e) => { e.currentTarget.style.display = 'none'; }} /> : null}\n                      {!s.img && <div className=\"svc-thumb-fb\">{s.emoji || '🥃'}</div>}\n                    </div>\n                    <div className=\"svc-body\">\n                      <div className=\"svc-meta\">\n                        <span className=\"svc-tag cat\">{s.cat}</span>\n                        {s.dur && <span className=\"svc-tag\">{s.dur}</span>}\n                        <span className={statusClass(s.status)}>{s.status}</span>\n                      </div>\n                      <h3>{s.name}</h3>\n                      <p>{s.desc}</p>\n                      <div className=\"svc-price\">{s.price}</div>\n                    </div>\n                  </article>\n                ))}\n              </div>\n            )}\n          </>\n        )}\n      </div>\n\n      {active && (\n        <div className=\"modal-overlay\" onClick={() => setActive(null)}>\n          <div className=\"modal\" onClick={(e) => e.stopPropagation()}>\n            <button className=\"modal-close\" onClick={() => setActive(null)}>✕</button>\n            <div className=\"modal-thumb\">\n              {active.img ? <img src={active.img} alt={active.name} /> : <span>{active.emoji || '🥃'}</span>}\n            </div>\n            <div className=\"modal-body\">\n              <div className=\"modal-meta\">\n                <span className=\"svc-tag cat\">{active.cat}</span>\n                {active.dur && <span className=\"svc-tag\">{active.dur}</span>}\n                <span className={statusClass(active.status)}>{active.status}</span>\n              </div>\n              <h2>{active.name}</h2>\n              <div className=\"modal-desc\">{active.detail || active.desc}</div>\n              <div className=\"modal-foot\">\n                <span className=\"modal-price\">{active.price}</span>\n                <button className=\"btn btn-primary\">주문하기</button>\n              </div>\n            </div>\n          </div>\n        </div>\n      )}\n    </section>\n  );\n}\n\n/* ============================================\n   Process\n   ============================================ */\nfunction Process() {\n  const steps = [\n    { i: '🔍', t: '취향 상담', d: '선호하는 맛과 예산을 알려주세요' },\n    { i: '🍷', t: '위스키 추천', d: '전문 소믈리에가 맞춤 추천' },\n    { i: '📦', t: '주문 & 배송', d: '프리미엄 패키징으로 안전 배송' },\n    { i: '🥃', t: '즐기시기', d: '테이스팅 가이드와 함께 우아한 한 잔' },\n  ];\n  return (\n    <section id=\"process\">\n      <div className=\"container\">\n        <div className=\"sec-head anim\">\n          <span className=\"eyebrow\">이용 프로세스</span>\n          <h2>4단계로 만나는 당신의 위스키</h2>\n        </div>\n        <div className=\"proc-grid\">\n          {steps.map((s, i) => (\n            <div key={i} className=\"proc-step anim\">\n              <div className=\"proc-icon\">{s.i}</div>\n              <h3>{s.t}</h3>\n              <p>{s.d}</p>\n            </div>\n          ))}\n        </div>\n      </div>\n    </section>\n  );\n}\n\n/* ============================================\n   Reviews\n   ============================================ */\nfunction Reviews() {\n  const [items, setItems] = useState(null);\n  const [idx, setIdx] = useState(-1);\n\n  useEffect(() => {\n    loadReviews().then(setItems).catch(() => setItems(FALLBACK_REV));\n  }, []);\n\n  useEffect(() => {\n    if (idx < 0) return;\n    document.body.style.overflow = 'hidden';\n    const onKey = (e) => {\n      if (e.key === 'Escape') setIdx(-1);\n      if (e.key === 'ArrowLeft' && idx > 0) setIdx(idx - 1);\n      if (e.key === 'ArrowRight' && items && idx < items.length - 1) setIdx(idx + 1);\n    };\n    window.addEventListener('keydown', onKey);\n    return () => { document.body.style.overflow = ''; window.removeEventListener('keydown', onKey); };\n  }, [idx, items]);\n\n  const avg = useMemo(() => {\n    if (!items || !items.length) return 0;\n    return (items.reduce((s, r) => s + (r.stars || 5), 0) / items.length).toFixed(1);\n  }, [items]);\n\n  return (\n    <section id=\"reviews\" className=\"sec-dark\">\n      <div className=\"container\">\n        <div className=\"sec-head anim\">\n          <span className=\"eyebrow\">고객 후기</span>\n          <h2>고객의 한 잔, 그 이야기</h2>\n        </div>\n\n        {!items && <Spinner />}\n\n        {items && items.length === 0 && <Empty />}\n\n        {items && items.length > 0 && (\n          <>\n            <div className=\"rev-banner anim\">\n              <div><div className=\"rev-stat-num grad-text\">{avg} ★</div><div className=\"rev-stat-label\">평균 별점</div></div>\n              <div><div className=\"rev-stat-num grad-text\">{items.length}+</div><div className=\"rev-stat-label\">실제 후기</div></div>\n              <div><div className=\"rev-stat-num grad-text\">98%</div><div className=\"rev-stat-label\">재구매율</div></div>\n            </div>\n            <div className=\"rev-grid\">\n              {items.map((r, i) => (\n                <article key={r.id} className=\"rev-card anim\" onClick={() => setIdx(i)}>\n                  <Stars n={r.stars} />\n                  <p className=\"rev-quote\">\"{r.text}\"</p>\n                  <div className=\"rev-foot\">\n                    <Avatar name={r.name} />\n                    <div>\n                      <div className=\"rev-name\">{r.name}</div>\n                      <div className=\"rev-date\">{formatDate(r.date)}</div>\n                    </div>\n                  </div>\n                  {r.svc && <div className=\"rev-svc\"><span className=\"svc-tag cat\">{r.svc}</span></div>}\n                </article>\n              ))}\n            </div>\n          </>\n        )}\n      </div>\n\n      {idx >= 0 && items && items[idx] && (\n        <div className=\"modal-overlay\" onClick={() => setIdx(-1)}>\n          <div className=\"modal\" onClick={(e) => e.stopPropagation()}>\n            <button className=\"modal-close\" onClick={() => setIdx(-1)}>✕</button>\n            <div className=\"car-nav\">\n              <button className=\"car-arrow\" disabled={idx === 0} onClick={() => setIdx(idx - 1)}>←</button>\n              <span className=\"car-idx\">{idx + 1} / {items.length}</span>\n              <button className=\"car-arrow\" disabled={idx === items.length - 1} onClick={() => setIdx(idx + 1)}>→</button>\n            </div>\n            <div className=\"modal-body\">\n              <Stars n={items[idx].stars} />\n              <p className=\"modal-desc modal-quote\">\"{items[idx].text}\"</p>\n              <div className=\"rev-foot rev-foot-modal\">\n                <Avatar name={items[idx].name} />\n                <div>\n                  <div className=\"rev-name\">{items[idx].name}</div>\n                  <div className=\"rev-date\">{formatDate(items[idx].date)} · {items[idx].svc}</div>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      )}\n    </section>\n  );\n}\n\n/* ============================================\n   FAQ\n   ============================================ */\nfunction FaqSection() {\n  const [items, setItems] = useState(null);\n  const [filter, setFilter] = useState('전체');\n  const [openId, setOpenId] = useState(null);\n\n  useEffect(() => {\n    loadFaqs().then(setItems).catch(() => setItems(FALLBACK_FAQ));\n  }, []);\n\n  const cats = useMemo(() => {\n    if (!items) return ['전체'];\n    return ['전체', ...Array.from(new Set(items.map(i => i.cat).filter(Boolean)))];\n  }, [items]);\n\n  const filtered = useMemo(() => {\n    if (!items) return [];\n    return filter === '전체' ? items : items.filter(i => i.cat === filter);\n  }, [items, filter]);\n\n  return (\n    <section id=\"faq\">\n      <div className=\"container\">\n        <div className=\"sec-head anim\">\n          <span className=\"eyebrow\">자주 묻는 질문</span>\n          <h2>FAQ</h2>\n        </div>\n\n        {!items && <Spinner />}\n\n        {items && (\n          <>\n            <div className=\"filter-bar anim\">\n              {cats.map(c => (\n                <button key={c} className={'f-chip' + (c === filter ? ' active' : '')} onClick={() => setFilter(c)}>{c}</button>\n              ))}\n            </div>\n            {filtered.length === 0 ? <Empty /> : (\n              <div className=\"faq-wrap anim\">\n                {filtered.map(f => (\n                  <div key={f.id} className={'faq-item' + (openId === f.id ? ' open' : '')}>\n                    <button className=\"faq-q\" onClick={() => setOpenId(openId === f.id ? null : f.id)}>\n                      <span>{f.q}</span>\n                      <span className=\"faq-arrow\">⌃</span>\n                    </button>\n                    <div className=\"faq-a\">{f.a}</div>\n                  </div>\n                ))}\n              </div>\n            )}\n          </>\n        )}\n      </div>\n    </section>\n  );\n}\n\n/* ============================================\n   Review Form\n   ============================================ */\nfunction CustomSelect({ value, options, onChange, placeholder }) {\n  const [open, setOpen] = useState(false);\n  const wrapRef = useRef(null);\n  useEffect(() => {\n    const onClick = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };\n    document.addEventListener('click', onClick);\n    return () => document.removeEventListener('click', onClick);\n  }, []);\n  return (\n    <div className={'cs-wrap' + (open ? ' cs-open' : '')} ref={wrapRef}>\n      <button type=\"button\" className=\"form-select-trigger\" onClick={() => setOpen(o => !o)}>\n        <span>{value || placeholder}</span>\n        <span className=\"cs-arrow\">⌃</span>\n      </button>\n      {open && (\n        <div className=\"cs-menu\">\n          {options.map(opt => (\n            <button type=\"button\" key={opt} className=\"cs-opt\" onClick={() => { onChange(opt); setOpen(false); }}>\n              <span>{opt}</span>\n              {value === opt && <span className=\"cs-check\">✓</span>}\n            </button>\n          ))}\n        </div>\n      )}\n    </div>\n  );\n}\n\nfunction ReviewForm() {\n  const [form, setForm] = useState({ name: '', svc: '', stars: 5, text: '' });\n  const [submitted, setSubmitted] = useState(false);\n  const [busy, setBusy] = useState(false);\n  const services = ['싱글몰트', '테이스팅', '클래스', '캐스크', '구독'];\n\n  const onSubmit = async (e) => {\n    e.preventDefault();\n    if (!form.name || !form.svc || !form.text) return;\n    setBusy(true);\n    const id = extractDbId(DB_REV);\n    if (id && id.length === 32) {\n      try {\n        await fetch('/api/notion/pages', {\n          method: 'POST',\n          headers: { 'Content-Type': 'application/json' },\n          body: JSON.stringify({\n            parent: { database_id: id },\n            properties: {\n              '고객명':      { title: [{ text: { content: form.name } }] },\n              '별점':        { select: { name: '⭐'.repeat(form.stars) } },\n              '서비스 종류': { select: { name: form.svc } },\n              '후기 내용':   { rich_text: [{ text: { content: form.text } }] },\n              '작성일':      { date: { start: new Date().toISOString().slice(0, 10) } },\n              '공개 여부':   { checkbox: false },\n            },\n          }),\n        });\n      } catch { /* UX 우선: 실패해도 성공 화면 표시 */ }\n    }\n    setBusy(false);\n    setSubmitted(true);\n  };\n\n  const reset = () => { setForm({ name: '', svc: '', stars: 5, text: '' }); setSubmitted(false); };\n\n  return (\n    <section id=\"review-form\" className=\"sec-dark\">\n      <div className=\"container\">\n        <div className=\"sec-head anim\">\n          <span className=\"eyebrow\">후기 작성</span>\n          <h2>당신의 한 잔, 들려주세요</h2>\n          <p>운영자 검토 후 공개됩니다</p>\n        </div>\n        <div className=\"form-wrap anim\">\n          <div className=\"form-card\">\n            {submitted ? (\n              <div className=\"form-success\">\n                <div className=\"emoji\">🎉</div>\n                <h3>후기 등록 완료!</h3>\n                <p className=\"form-success-msg\">소중한 후기 감사합니다. 운영자 검토 후 공개됩니다.</p>\n                <button className=\"btn btn-ghost\" onClick={reset}>새 후기 작성하기</button>\n              </div>\n            ) : (\n              <form onSubmit={onSubmit}>\n                <div className=\"form-row\">\n                  <label className=\"form-label\">이름</label>\n                  <input className=\"form-input\" type=\"text\" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder=\"홍길동\" required />\n                </div>\n                <div className=\"form-row\">\n                  <label className=\"form-label\">서비스 종류</label>\n                  <CustomSelect value={form.svc} options={services} onChange={v => setForm(f => ({ ...f, svc: v }))} placeholder=\"선택해주세요\" />\n                </div>\n                <div className=\"form-row\">\n                  <label className=\"form-label\">별점</label>\n                  <div className=\"star-row\">\n                    {[1, 2, 3, 4, 5].map(n => (\n                      <button type=\"button\" key={n} className={'star-btn' + (n <= form.stars ? ' on' : '')} onClick={() => setForm(f => ({ ...f, stars: n }))}>★</button>\n                    ))}\n                  </div>\n                </div>\n                <div className=\"form-row\">\n                  <label className=\"form-label\">후기 내용</label>\n                  <textarea className=\"form-textarea\" value={form.text} onChange={e => setForm(f => ({ ...f, text: e.target.value }))} placeholder=\"위스키와 함께한 경험을 들려주세요\" required />\n                </div>\n                <button type=\"submit\" className=\"btn btn-primary btn-lg btn-block\" disabled={busy}>\n                  {busy ? '등록 중…' : '후기 등록하기'}\n                </button>\n              </form>\n            )}\n          </div>\n        </div>\n      </div>\n    </section>\n  );\n}\n\n/* ============================================\n   CTA\n   ============================================ */\nfunction Cta() {\n  const scrollTo = (id) => {\n    const el = document.getElementById(id);\n    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n  };\n  return (\n    <section id=\"cta\">\n      <div className=\"container\">\n        <div className=\"cta-wrap anim\">\n          <span className=\"eyebrow\">지금 시작하세요</span>\n          <h2>당신만의 한 잔을 발견할 시간</h2>\n          <p>전문 소믈리에가 큐레이션한 위스키와 함께, 깊고 우아한 시간을 만들어보세요.</p>\n          <div className=\"cta-btns\">\n            <button className=\"btn btn-primary btn-lg\" onClick={() => scrollTo('services')}>컬렉션 둘러보기</button>\n            <button className=\"btn btn-ghost btn-lg\" onClick={() => scrollTo('review-form')}>후기 작성하기</button>\n          </div>\n          <span className=\"cta-note\">🎁 첫 주문 시 무료 테이스팅 노트 제공</span>\n        </div>\n      </div>\n    </section>\n  );\n}\n\n/* ============================================\n   Footer\n   ============================================ */\nfunction Footer({ goBlog }) {\n  return (\n    <footer className=\"foot\">\n      <div className=\"container\">\n        <div className=\"foot-inner\">\n          <div className=\"foot-brand\">🥃 Angel's Share</div>\n          <div className=\"foot-links\">\n            <button className=\"foot-link-strong\" onClick={goBlog}>📖 위스키 스토리</button>\n            <button>이용약관</button>\n            <button>개인정보처리방침</button>\n            <button>문의하기</button>\n          </div>\n        </div>\n        <div className=\"foot-copy\">© 2026 Angel's Share. All rights reserved.</div>\n      </div>\n    </footer>\n  );\n}\n\n/* ============================================\n   Blog (목록)\n   ============================================ */\nfunction Blog({ goArticle }) {\n  const [items, setItems] = useState(null);\n  const [filter, setFilter] = useState('전체');\n\n  useEffect(() => {\n    loadStories().then(setItems).catch(() => setItems(FALLBACK_STORIES));\n  }, []);\n\n  const cats = useMemo(() => {\n    if (!items) return ['전체'];\n    return ['전체', ...Array.from(new Set(items.map(i => i.cat).filter(Boolean)))];\n  }, [items]);\n\n  const filtered = useMemo(() => {\n    if (!items) return [];\n    return filter === '전체' ? items : items.filter(i => i.cat === filter);\n  }, [items, filter]);\n\n  useReveal();\n\n  return (\n    <>\n      <section className=\"blog-hero\">\n        <div className=\"container\">\n          <h1>위스키 <em>스토리</em></h1>\n          <p>큐레이터가 풀어내는 위스키의 이야기. 입문자부터 마니아까지.</p>\n        </div>\n      </section>\n      <div className=\"container\">\n        {!items && <Spinner msg=\"스토리를 불러오는 중…\" />}\n        {items && (\n          <>\n            <div className=\"filter-bar\">\n              {cats.map(c => (\n                <button key={c} className={'f-chip' + (c === filter ? ' active' : '')} onClick={() => setFilter(c)}>{c}</button>\n              ))}\n            </div>\n            {filtered.length === 0 ? <Empty /> : (\n              <div className=\"blog-grid\">\n                {filtered.map(s => (\n                  <article key={s.id} className={'blog-card' + (s.featured ? ' featured' : '')} onClick={() => goArticle(s)}>\n                    <div className=\"blog-thumb\">\n                      {s.img ? <img src={s.img} alt={s.title} onError={(e) => { e.currentTarget.style.display = 'none'; }} /> : null}\n                      {!s.img && <span>{s.emoji || '📖'}</span>}\n                    </div>\n                    <div className=\"blog-body\">\n                      <span className=\"blog-cat\">{s.cat}</span>\n                      <h3>{s.title}</h3>\n                      <p>{s.summary}</p>\n                      <div className=\"blog-meta\">\n                        <span>{s.author}</span>\n                        <span className=\"blog-meta-dot\"></span>\n                        <span>{formatDate(s.date)}</span>\n                        <span className=\"blog-meta-dot\"></span>\n                        <span>{s.readTime}분</span>\n                        <span className=\"blog-meta-dot\"></span>\n                        <span>👁 {s.views}</span>\n                      </div>\n                    </div>\n                  </article>\n                ))}\n              </div>\n            )}\n          </>\n        )}\n      </div>\n    </>\n  );\n}\n\n/* ============================================\n   Article (상세)\n   ============================================ */\nfunction Article({ article, goBlog }) {\n  useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [article]);\n  const html = useMemo(() => mdToHtml(article.body || ''), [article]);\n  return (\n    <section className=\"article\">\n      <div className=\"container article-inner\">\n        <button className=\"article-back\" onClick={goBlog}>← 스토리 목록</button>\n        <span className=\"article-cat\">{article.cat}</span>\n        <h1>{article.title}</h1>\n        <div className=\"article-meta\">\n          <Avatar name={article.author} />\n          <span>{article.author}</span>\n          <span className=\"blog-meta-dot\"></span>\n          <span>{formatDate(article.date)}</span>\n          <span className=\"blog-meta-dot\"></span>\n          <span>{article.readTime}분</span>\n          <span className=\"blog-meta-dot\"></span>\n          <span>👁 {article.views}</span>\n        </div>\n        <div className=\"article-img\">\n          {article.img ? <img src={article.img} alt={article.title} /> : <span>{article.emoji || '📖'}</span>}\n        </div>\n        <div className=\"article-body\" ref={(el) => { if (el) el.innerHTML = html; }} />\n        {article.tags && article.tags.length > 0 && (\n          <div className=\"article-tags\">\n            {article.tags.map(t => <span key={t} className=\"article-tag\">{t}</span>)}\n          </div>\n        )}\n      </div>\n    </section>\n  );\n}\n\n/* ============================================\n   App (View Switcher)\n   ============================================ */\nfunction Home({ goBlog }) {\n  useReveal();\n  return (\n    <>\n      <Hero goBlog={goBlog} />\n      <TrustBar />\n      <Services />\n      <Process />\n      <Reviews />\n      <FaqSection />\n      <ReviewForm />\n      <Cta />\n    </>\n  );\n}\n\nfunction App() {\n  const [view, setView] = useState('home');\n  const [article, setArticle] = useState(null);\n  const [pendingScroll, setPendingScroll] = useState(null);\n\n  const goHome = (anchor) => { setView('home'); if (anchor) setPendingScroll(anchor); };\n  const goBlog = () => { setView('blog'); window.scrollTo({ top: 0 }); };\n  const goArticle = (s) => { setArticle(s); setView('article'); };\n\n  useEffect(() => {\n    if (view === 'home' && pendingScroll) {\n      const id = pendingScroll;\n      setPendingScroll(null);\n      setTimeout(() => {\n        const el = document.getElementById(id);\n        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n      }, 80);\n    }\n  }, [view, pendingScroll]);\n\n  return (\n    <>\n      <Nav view={view} goHome={goHome} goBlog={goBlog} />\n      {view === 'home'    && <Home goBlog={goBlog} />}\n      {view === 'blog'    && <Blog goArticle={goArticle} />}\n      {view === 'article' && article && <Article article={article} goBlog={goBlog} />}\n      <Footer goBlog={goBlog} />\n    </>\n  );\n}\n\nReactDOM.createRoot(document.getElementById('root')).render(<App />);";
